name: Bi-Weekly Ingestion & Analysis Scheduler

on:
  schedule:
    # Runs on the 1st and 15th of every month at 10:00 AM IST (04:30 AM UTC)
    - cron: '30 4 1,15 * *'
  workflow_dispatch:
    # Allows manual triggering from the GitHub Actions console tab

jobs:
  trigger-pipeline:
    name: Trigger Production Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests loguru

      - name: Execute Pipeline Trigger
        env:
          BACKEND_API_URL: ${{ secrets.BACKEND_API_URL }}
          PIPELINE_TRIGGER_SECRET: ${{ secrets.PIPELINE_TRIGGER_SECRET }}
        run: |
          python backend/scripts/run_cron_ingest.py
